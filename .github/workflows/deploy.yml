name: Mule CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build & Deploy to CloudHub
        run: mvn clean deploy -DmuleDeploy
        env:
          ANYPOINT_USERNAME: ${{ secrets.CLIENT_ID }}
          ANYPOINT_PASSWORD: ${{ secrets.CLIENT_SECRET }}